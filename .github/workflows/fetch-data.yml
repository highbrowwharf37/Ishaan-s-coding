name: Fetch CBB Data
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch Barttorvik data
        run: python3 scripts/fetch-data/fetch_cbb_data.py

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/data.json
          git commit -m "Update CBB data" || echo "No changes"
          git push
