<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nba live - real-time play-by-play</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #09090f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a38;
      --text: #f0f0f8;
      --muted: #6b6b85;
      --dim: #3a3a50;
      --live: #ef4444;
      --live-glow: rgba(239, 68, 68, 0.25);
      --green: #22c55e;
      --gold: #f59e0b;
      --blue: #3b82f6;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #0f0f1a 0%, #1a0f2e 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-icon {
      font-size: 22px;
    }

    .logo-sub {
      font-size: 10px;
      font-weight: 400;
      color: var(--muted);
      display: block;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }

    .date-btn:hover {
      background: var(--dim);
    }

    #date-display {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      min-width: 110px;
      text-align: center;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #clock {
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .queue-badge {
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      color: var(--muted);
    }

    .live-count {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 700;
      color: var(--live);
    }

    .pulse-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--live);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(0.8);
      }
    }

    /* STATUS BAR */
    .status-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 6px 24px;
      font-size: 11px;
      color: var(--muted);
    }

    .status-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
    }

    .status-dot.error {
      background: var(--live);
    }

    .status-dot.loading {
      background: var(--gold);
      animation: pulse 1s infinite;
    }

    /* MAIN LAYOUT */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 1100px) {
      .main {
        grid-template-columns: 420px 1fr;
      }
    }

    /* GAMES PANEL */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
    }

    .games-list {
      overflow-y: auto;
      max-height: calc(100vh - 160px);
    }

    /* GAME CARD */
    .game-card {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }

    .game-card:last-child {
      border-bottom: none;
    }

    .game-card:hover {
      background: var(--surface2);
    }

    .game-card.selected {
      background: var(--surface2);
      border-left: 3px solid var(--blue);
    }

    .game-card.live {
      border-left: 3px solid var(--live);
    }

    .game-card.live.selected {
      border-left: 3px solid var(--live);
      background: rgba(239, 68, 68, 0.05);
    }

    .game-status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .game-status-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 2px 7px;
      border-radius: 3px;
    }

    .badge-live {
      background: var(--live-glow);
      color: var(--live);
    }

    .badge-scheduled {
      background: rgba(59, 130, 246, 0.15);
      color: var(--blue);
    }

    .badge-halftime {
      background: rgba(245, 158, 11, 0.15);
      color: var(--gold);
    }

    .badge-closed {
      background: rgba(107, 107, 133, 0.15);
      color: var(--muted);
    }

    .game-clock {
      font-size: 11px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .teams-row {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .team-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .team-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .team-swatch {
      width: 4px;
      height: 32px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .team-name-block {
      display: flex;
      flex-direction: column;
    }

    .team-alias {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .team-full {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }

    .team-score {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -1px;
      font-variant-numeric: tabular-nums;
    }

    .team-score.leading {
      color: var(--text);
    }

    .team-score.trailing {
      color: var(--muted);
    }

    .score-divider {
      height: 1px;
      background: var(--border);
      margin: 2px 0;
    }

    .game-meta {
      margin-top: 10px;
      font-size: 10px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .game-meta-sep {
      opacity: 0.4;
    }

    /* PBP PANEL */
    .pbp-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 160px);
    }

    .pbp-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .pbp-scoreboard {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 10px;
    }

    .pbp-team {
      text-align: center;
      flex: 1;
    }

    .pbp-team-alias {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    .pbp-team-score {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .pbp-divider {
      font-size: 20px;
      color: var(--dim);
      font-weight: 300;
    }

    .pbp-game-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .pbp-period {
      font-weight: 700;
      color: var(--text);
    }

    .pbp-clock-display {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: var(--gold);
      font-size: 15px;
    }

    .pbp-feed {
      overflow-y: auto;
      flex: 1;
      padding: 0;
    }

    .pbp-empty {
      padding: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .pbp-loading {
      padding: 40px;
      text-align: center;
      color: var(--muted);
    }

    .spinner-sm {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* PERIOD SEPARATOR */
    .period-sep {
      padding: 6px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
    }

    .period-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* PLAY EVENT */
    .play-event {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 42px 1fr auto;
      align-items: start;
      gap: 8px;
      transition: background 0.15s;
      animation: fadeIn 0.3s ease;
    }

    .play-event:hover {
      background: var(--surface2);
    }

    .play-event.new {
      animation: slideIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .play-clock {
      font-size: 11px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      padding-top: 2px;
    }

    .play-body {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .play-icon {
      font-size: 14px;
    }

    .play-desc {
      font-size: 12px;
      color: var(--text);
      line-height: 1.4;
    }

    .play-score-change {
      font-size: 11px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      padding-top: 2px;
      white-space: nowrap;
    }

    /* Play type colors */
    .play-event.pts2 .play-icon {
      color: var(--green);
    }

    .play-event.pts3 .play-icon {
      color: var(--gold);
    }

    .play-event.ft .play-icon {
      color: #86efac;
    }

    .play-event.miss .play-desc {
      color: var(--muted);
    }

    .play-event.turnover .play-icon {
      color: var(--live);
    }

    .play-event.foul .play-icon {
      color: #fb923c;
    }

    .play-event.rebound .play-icon {
      color: var(--blue);
    }

    .play-event.timeout .play-icon {
      color: var(--muted);
    }

    /* NO GAMES */
    .no-games {
      padding: 48px 24px;
      text-align: center;
      color: var(--muted);
    }

    .no-games-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .no-games-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .no-games-sub {
      font-size: 13px;
    }

    /* ERROR BANNER */
    .error-banner {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 12px;
      color: #fca5a5;
      margin: 16px;
    }

    /* CBB theme alignment */
    :root {
      --bg: #f9f7f4;
      --surface: #fff;
      --surface2: #f4f1ed;
      --border: #e2ddd7;
      --text: #1a1916;
      --muted: #6b6560;
      --dim: #9e9892;
      --live: #c0392b;
      --live-glow: rgba(192, 57, 43, 0.12);
      --green: #27ae60;
      --gold: #d68910;
      --blue: #2471a3;
      --font-sans: 'Libre Franklin', sans-serif;
      --font-serif: 'Source Serif 4', serif;
      --font: var(--font-sans);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      text-transform: lowercase;
    }

    header {
      background: var(--text);
      color: #fff;
      border-bottom: 3px solid var(--live);
      padding: 0 24px;
      position: static;
    }

    .header-inner {
      max-width: 1280px;
      height: 60px;
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #fff;
    }

    .logo-icon {
      font-size: 20px;
    }

    .logo-sub {
      color: #c8c2bc;
      letter-spacing: 0.5px;
    }

    .date-btn {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.22);
      color: #fff;
      border-radius: 3px;
    }

    .date-btn:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    #date-display {
      color: #fff;
      font-weight: 700;
    }

    #clock {
      color: #c8c2bc;
    }

    .queue-badge {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      color: #ddd8d2;
      border-radius: 3px;
    }

    .status-bar {
      background: var(--surface);
      border-bottom-color: var(--border);
      color: var(--muted);
    }

    .status-inner {
      max-width: 1280px;
    }

    .main {
      max-width: 1280px;
      padding: 24px;
      gap: 16px;
    }

    @media (min-width: 1100px) {
      .main {
        grid-template-columns: 390px 1fr;
      }
    }

    .panel,
    .pbp-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .panel-header {
      background: var(--surface2);
      border-bottom-color: var(--border);
      padding: 10px 12px;
    }

    .panel-title {
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .game-card {
      border-bottom-color: var(--border);
    }

    .game-card:hover {
      background: #faf8f5;
    }

    .game-card.selected {
      background: #eef4fa;
      border-left-color: var(--blue);
    }

    .game-card.live {
      border-left-color: var(--live);
    }

    .game-card.live.selected {
      background: #fdf3f2;
      border-left-color: var(--live);
    }

    .game-status-badge {
      border-radius: 2px;
      letter-spacing: 0.4px;
    }

    .badge-live {
      background: #fdf3f2;
      color: var(--live);
    }

    .badge-scheduled {
      background: #eaf3fb;
      color: var(--blue);
    }

    .badge-halftime {
      background: #fef9ec;
      color: var(--gold);
    }

    .badge-closed {
      background: var(--surface2);
      color: var(--muted);
    }

    .game-clock {
      color: var(--muted);
    }

    .team-alias {
      font-family: var(--font-serif);
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .team-full {
      color: var(--dim);
    }

    .team-score.leading {
      color: var(--text);
    }

    .team-score.trailing {
      color: var(--muted);
    }

    .score-divider {
      background: var(--border);
    }

    .game-meta {
      color: var(--dim);
    }

    .pbp-panel {
      max-height: calc(100vh - 170px);
    }

    .pbp-header {
      border-bottom-color: var(--border);
    }

    .pbp-team-alias {
      color: var(--muted);
    }

    .pbp-team-score {
      font-family: var(--font-serif);
      color: var(--text);
    }

    .pbp-divider {
      color: var(--dim);
    }

    .pbp-game-info {
      color: var(--muted);
    }

    .pbp-period {
      color: var(--text);
    }

    .pbp-clock-display {
      color: var(--gold);
    }

    .pbp-empty,
    .pbp-loading {
      color: var(--muted);
    }

    .spinner-sm {
      border-color: var(--border);
      border-top-color: var(--live);
    }

    .period-sep {
      background: var(--surface2);
      border-bottom-color: var(--border);
      border-top-color: var(--border);
      color: var(--muted);
    }

    .period-line {
      background: var(--border);
    }

    .play-event {
      border-bottom-color: var(--border);
    }

    .play-event:hover {
      background: #faf8f5;
    }

    .play-clock {
      color: var(--dim);
    }

    .play-desc {
      color: var(--text);
    }

    .play-score-change {
      color: var(--muted);
    }

    .play-event.pts2 .play-icon {
      color: var(--green);
    }

    .play-event.pts3 .play-icon {
      color: var(--blue);
    }

    .play-event.ft .play-icon {
      color: var(--green);
    }

    .play-event.miss .play-desc {
      color: var(--dim);
    }

    .play-event.turnover .play-icon {
      color: var(--live);
    }

    .play-event.foul .play-icon {
      color: var(--gold);
    }

    .play-event.rebound .play-icon {
      color: var(--blue);
    }

    .play-event.timeout .play-icon {
      color: var(--muted);
    }

    .no-games {
      color: var(--muted);
    }

    .no-games-title {
      color: var(--text);
      font-family: var(--font-serif);
      font-weight: 600;
    }

    .error-banner {
      background: #fdf3f2;
      border: 1px solid #f5c6c4;
      border-radius: 4px;
      color: var(--live);
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <div>
          nba live
          <span class="logo-sub">real-time play-by-play</span>
        </div>
      </div>
      <div class="date-nav">
        <button class="date-btn" id="prev-day">‹</button>
        <span id="date-display">—</span>
        <button class="date-btn" id="next-day">›</button>
      </div>
      <div class="header-right">
        <span id="clock">—</span>
        <span class="queue-badge">queue: <span id="queue-depth">0</span></span>
        <div class="live-count" id="live-indicator" style="display:none">
          <div class="pulse-dot"></div>
          <span id="live-count-text">0 live</span>
        </div>
      </div>
    </div>
  </header>

  <div class="status-bar">
    <div class="status-inner">
      <div class="status-item">
        <div class="status-dot" id="api-dot"></div>
        <span id="api-status">connecting...</span>
      </div>
      <span style="color:var(--dim)">·</span>
      <div class="status-item">
        last updated: <span id="last-updated">—</span>
      </div>
      <span style="color:var(--dim)">·</span>
      <div class="status-item">
        <span id="request-count">0</span> requests today
      </div>
    </div>
  </div>

  <div class="main">
    <!-- Games List -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title" id="games-title">games</span>
        <span id="games-count" style="font-size:11px;color:var(--muted)"></span>
      </div>
      <div class="games-list" id="games-list">
        <div class="pbp-loading">
          <div class="spinner-sm"></div>loading schedule...
        </div>
      </div>
    </div>

    <!-- PBP Panel -->
    <div class="pbp-panel" id="pbp-panel">
      <div class="pbp-header">
        <div class="pbp-scoreboard" id="pbp-scoreboard">
          <div class="pbp-team">
            <div class="pbp-team-alias" id="pbp-away-alias">—</div>
            <div class="pbp-team-score" id="pbp-away-score" style="color:var(--muted)">—</div>
          </div>
          <div class="pbp-divider">—</div>
          <div class="pbp-team">
            <div class="pbp-team-alias" id="pbp-home-alias">—</div>
            <div class="pbp-team-score" id="pbp-home-score" style="color:var(--muted)">—</div>
          </div>
        </div>
        <div class="pbp-game-info">
          <span id="pbp-period" class="pbp-period">—</span>
          <span id="pbp-clock-display" class="pbp-clock-display"></span>
          <span id="pbp-status-label" style="font-size:11px;color:var(--muted)"></span>
        </div>
      </div>
      <div class="pbp-feed" id="pbp-feed">
        <div class="pbp-empty">
          <div style="font-size:32px;margin-bottom:12px"></div>
          <div style="font-weight:700;margin-bottom:6px">select a game</div>
          <div style="font-size:12px;color:var(--muted)">click any game on the left to view live play-by-play</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIG
    // ============================================================
    const API_KEY = 'cibll8AELsjJaQsKQ3i3HQw5ZIxEk3N3zHuMXoZa';
    const ACCESS_LEVEL = 'trial';
    // After deploying GCP VM, set this to your VM's external IP, e.g. 'http://34.x.x.x:3000'
    const GCP_PROXY = '';
    const isLocal = ['localhost', '127.0.0.1'].includes(window.location.hostname);
    const PROXY_BASE = isLocal ? '' : GCP_PROXY;
    const BASE = `${PROXY_BASE}/sportradar/nba/${ACCESS_LEVEL}/v8/en`;

    // ============================================================
    // TEAM COLORS  (primary, secondary)
    // ============================================================
    const TEAM = {
      ATL: { color: '#E03A3E', bg: 'rgba(224,58,62,0.15)', full: 'Hawks' },
      BOS: { color: '#007A33', bg: 'rgba(0,122,51,0.15)', full: 'Celtics' },
      BKN: { color: '#FFFFFF', bg: 'rgba(255,255,255,0.1)', full: 'Nets' },
      CHA: { color: '#00788C', bg: 'rgba(0,120,140,0.15)', full: 'Hornets' },
      CHI: { color: '#CE1141', bg: 'rgba(206,17,65,0.15)', full: 'Bulls' },
      CLE: { color: '#FDBB30', bg: 'rgba(253,187,48,0.15)', full: 'Cavaliers' },
      DAL: { color: '#00538C', bg: 'rgba(0,83,140,0.15)', full: 'Mavericks' },
      DEN: { color: '#FEC524', bg: 'rgba(254,197,36,0.15)', full: 'Nuggets' },
      DET: { color: '#C8102E', bg: 'rgba(200,16,46,0.15)', full: 'Pistons' },
      GSW: { color: '#FFC72C', bg: 'rgba(255,199,44,0.15)', full: 'Warriors' },
      HOU: { color: '#CE1141', bg: 'rgba(206,17,65,0.15)', full: 'Rockets' },
      IND: { color: '#FDBB30', bg: 'rgba(253,187,48,0.15)', full: 'Pacers' },
      LAC: { color: '#C8102E', bg: 'rgba(200,16,46,0.15)', full: 'Clippers' },
      LAL: { color: '#FDB927', bg: 'rgba(253,185,39,0.15)', full: 'Lakers' },
      MEM: { color: '#5D76A9', bg: 'rgba(93,118,169,0.15)', full: 'Grizzlies' },
      MIA: { color: '#98002E', bg: 'rgba(152,0,46,0.15)', full: 'Heat' },
      MIL: { color: '#00471B', bg: 'rgba(0,71,27,0.15)', full: 'Bucks' },
      MIN: { color: '#236192', bg: 'rgba(35,97,146,0.15)', full: 'Timberwolves' },
      NOP: { color: '#85714D', bg: 'rgba(133,113,77,0.15)', full: 'Pelicans' },
      NYK: { color: '#F58426', bg: 'rgba(245,132,38,0.15)', full: 'Knicks' },
      OKC: { color: '#007AC1', bg: 'rgba(0,122,193,0.15)', full: 'Thunder' },
      ORL: { color: '#0077C0', bg: 'rgba(0,119,192,0.15)', full: 'Magic' },
      PHI: { color: '#006BB6', bg: 'rgba(0,107,182,0.15)', full: '76ers' },
      PHX: { color: '#E56020', bg: 'rgba(229,96,32,0.15)', full: 'Suns' },
      POR: { color: '#E03A3E', bg: 'rgba(224,58,62,0.15)', full: 'Trail Blazers' },
      SAC: { color: '#5A2D81', bg: 'rgba(90,45,129,0.15)', full: 'Kings' },
      SAS: { color: '#C4CED4', bg: 'rgba(196,206,212,0.1)', full: 'Spurs' },
      TOR: { color: '#CE1141', bg: 'rgba(206,17,65,0.15)', full: 'Raptors' },
      UTA: { color: '#002B5C', bg: 'rgba(0,43,92,0.15)', full: 'Jazz' },
      WAS: { color: '#E31837', bg: 'rgba(227,24,55,0.15)', full: 'Wizards' },
    };
    function teamInfo(alias) {
      return TEAM[alias] || { color: '#6b6b85', bg: 'rgba(107,107,133,0.1)', full: alias };
    }

    // ============================================================
    // REQUEST QUEUE — strict 1 QPS
    // ============================================================
    const queue = [];
    let queueProcessing = false;
    let lastReqTime = 0;
    let requestCount = 0;
    let retryDelay = 1000;

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function enqueue(fn, priority = 0) {
      return new Promise((resolve, reject) => {
        queue.push({ fn, resolve, reject, priority, added: Date.now() });
        queue.sort((a, b) => b.priority - a.priority);
        updateQueueUI();
        if (!queueProcessing) drainQueue();
      });
    }

    async function drainQueue() {
      queueProcessing = true;
      while (queue.length > 0) {
        const gap = 1050 - (Date.now() - lastReqTime); // 1.05s minimum between requests
        if (gap > 0) await sleep(gap);

        const { fn, resolve, reject } = queue.shift();
        updateQueueUI();
        lastReqTime = Date.now();
        requestCount++;
        document.getElementById('request-count').textContent = requestCount;

        try {
          const result = await fn();
          retryDelay = 1000;
          resolve(result);
        } catch (err) {
          if (err.status === 429) {
            // Rate limited — re-add with backoff
            retryDelay = Math.min(retryDelay * 2, 30000);
            setStatus(`rate limited. backing off ${(retryDelay / 1000).toFixed(0)}s…`, 'loading');
            await sleep(retryDelay);
          }
          reject(err);
        }
      }
      queueProcessing = false;
      updateQueueUI();
    }

    function updateQueueUI() {
      document.getElementById('queue-depth').textContent = queue.length;
    }

    // ============================================================
    // API CALLS
    // ============================================================
    async function apiFetch(path) {
      const url = `${BASE}/${path}?api_key=${API_KEY}`;
      const res = await fetch(url);
      if (res.status === 429) {
        const e = new Error('rate limited'); e.status = 429; throw e;
      }
      if (!res.ok) {
        throw new Error(`api error ${res.status}: ${await res.text().catch(() => '')}`);
      }
      return res.json();
    }

    function fetchSchedule(y, m, d) {
      return enqueue(() => apiFetch(`games/${y}/${m}/${d}/schedule.json`), 10);
    }

    function fetchPBP(gameId) {
      return enqueue(() => apiFetch(`games/${gameId}/pbp.json`), 5);
    }

    function fetchSummary(gameId) {
      return enqueue(() => apiFetch(`games/${gameId}/summary.json`), 3);
    }

    // ============================================================
    // STATE
    // ============================================================
    const state = {
      viewDate: new Date(), // The date being viewed
      games: [],         // Raw game objects from schedule
      pbp: {},         // { gameId: pbpData }
      selectedId: null,
      pollers: {},         // { gameId: timeoutId }
      knownEventIds: {},      // { gameId: Set<eventId> }
    };

    // ============================================================
    // DATE HELPERS
    // ============================================================
    function pad2(n) { return String(n).padStart(2, '0'); }

    function dateLabel(d) {
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }).toLowerCase();
    }

    function gameLocalTime(scheduledUTC) {
      const d = new Date(scheduledUTC);
      return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York' }) + ' et';
    }

    function gamesTitleLabel(d) {
      return `games for ${dateLabel(d)}`;
    }

    // ============================================================
    // STATUS BAR
    // ============================================================
    function setStatus(msg, type = 'ok') {
      document.getElementById('api-status').textContent = msg;
      const dot = document.getElementById('api-dot');
      dot.className = 'status-dot' + (type === 'error' ? ' error' : type === 'loading' ? ' loading' : '');
      document.getElementById('last-updated').textContent = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    // ============================================================
    // SCHEDULE
    // ============================================================
    async function loadSchedule() {
      const d = state.viewDate;
      const y = d.getFullYear();
      const m = pad2(d.getMonth() + 1);
      const day = pad2(d.getDate());

      document.getElementById('date-display').textContent = dateLabel(d);
      document.getElementById('games-title').textContent = gamesTitleLabel(d);
      document.getElementById('games-list').innerHTML = '<div class="pbp-loading"><div class="spinner-sm"></div>loading schedule…</div>';
      setStatus('fetching schedule…', 'loading');

      try {
        const data = await fetchSchedule(y, m, day);
        state.games = data.games || [];
        setStatus(`schedule loaded — ${state.games.length} game${state.games.length !== 1 ? 's' : ''}`, 'ok');
        renderGames();
        startLivePollers();
        if (state.selectedId) loadPBP(state.selectedId);
      } catch (err) {
        setStatus('failed to load schedule: ' + err.message, 'error');
        document.getElementById('games-list').innerHTML =
          `<div class="error-banner">error: ${err.message}<br><small>check your api key and access level (currently: ${ACCESS_LEVEL})</small></div>`;
      }
    }

    // ============================================================
    // GAME RENDERING
    // ============================================================
    function gameStatusLabel(status) {
      if (!status) return { text: 'tbd', cls: 'badge-scheduled' };
      const s = status.toLowerCase();
      if (s === 'inprogress') return { text: 'live', cls: 'badge-live' };
      if (s === 'halftime') return { text: 'half', cls: 'badge-halftime' };
      if (s === 'closed' || s === 'complete') return { text: 'final', cls: 'badge-closed' };
      return { text: 'tbd', cls: 'badge-scheduled' };
    }

    function isLive(status) {
      const s = (status || '').toLowerCase();
      return s === 'inprogress' || s === 'halftime';
    }

    function periodLabel(num) {
      if (!num) return '';
      if (num > 4) return `ot${num - 4 > 1 ? num - 4 : ''}`;
      return `q${num}`;
    }

    function renderGames() {
      const list = document.getElementById('games-list');
      const count = document.getElementById('games-count');
      const liveIndicator = document.getElementById('live-indicator');
      const liveCountText = document.getElementById('live-count-text');

      const games = state.games;
      if (!games.length) {
        list.innerHTML = `<div class="no-games">
      <div class="no-games-title">no games for this date</div>
      <div class="no-games-sub">try a different date using the arrows above</div>
    </div>`;
        count.textContent = '';
        liveIndicator.style.display = 'none';
        return;
      }

      count.textContent = `${games.length} game${games.length !== 1 ? 's' : ''}`;

      const liveGames = games.filter(g => isLive(g.status));
      if (liveGames.length > 0) {
        liveIndicator.style.display = 'flex';
        liveCountText.textContent = `${liveGames.length} live`;
      } else {
        liveIndicator.style.display = 'none';
      }

      list.innerHTML = '';
      games.forEach(g => {
        const away = g.away || {};
        const home = g.home || {};
        const awayAlias = away.alias || away.abbr || '—';
        const homeAlias = home.alias || home.abbr || '—';
        const awayInfo = teamInfo(awayAlias);
        const homeInfo = teamInfo(homeAlias);
        const awayScore = away.points ?? null;
        const homeScore = home.points ?? null;
        const awayLeading = awayScore !== null && homeScore !== null && awayScore > homeScore;
        const homeLeading = homeScore !== null && awayScore !== null && homeScore > awayScore;
        const badge = gameStatusLabel(g.status);
        const live = isLive(g.status);
        const isSelected = g.id === state.selectedId;

        const card = document.createElement('div');
        card.className = `game-card${live ? ' live' : ''}${isSelected ? ' selected' : ''}`;
        card.dataset.id = g.id;

        const clockStr = g.clock ? `<span class="game-clock">${periodLabel(g.quarter || g.period)} ${g.clock}</span>` : '';
        const timeStr = g.scheduled ? `<span class="game-clock">${gameLocalTime(g.scheduled)}</span>` : '';

        const awayScoreHtml = awayScore !== null
          ? `<span class="team-score ${awayLeading ? 'leading' : homeScore !== null ? 'trailing' : ''}">${awayScore}</span>`
          : `<span class="team-score" style="color:var(--dim)">—</span>`;
        const homeScoreHtml = homeScore !== null
          ? `<span class="team-score ${homeLeading ? 'leading' : awayScore !== null ? 'trailing' : ''}">${homeScore}</span>`
          : `<span class="team-score" style="color:var(--dim)">—</span>`;

        card.innerHTML = `
      <div class="game-status-row">
        <span class="game-status-badge ${badge.cls}">${badge.text}</span>
        ${live ? clockStr : timeStr}
      </div>
      <div class="teams-row">
        <div class="team-row">
          <div class="team-info">
            <div class="team-swatch" style="background:${awayInfo.color}"></div>
            <div class="team-name-block">
              <span class="team-alias" style="color:${awayInfo.color}">${awayAlias}</span>
              <span class="team-full">${awayInfo.full}</span>
            </div>
          </div>
          ${awayScoreHtml}
        </div>
        <div class="score-divider"></div>
        <div class="team-row">
          <div class="team-info">
            <div class="team-swatch" style="background:${homeInfo.color}"></div>
            <div class="team-name-block">
              <span class="team-alias" style="color:${homeInfo.color}">${homeAlias}</span>
              <span class="team-full">${homeInfo.full}</span>
            </div>
          </div>
          ${homeScoreHtml}
        </div>
      </div>
      <div class="game-meta">
        <span>${away.name || awayAlias} @ ${home.name || homeAlias}</span>
        ${g.venue ? `<span class="game-meta-sep">·</span><span>${g.venue.name || ''}</span>` : ''}
      </div>`;

        card.addEventListener('click', () => selectGame(g.id));
        list.appendChild(card);
      });
    }

    // ============================================================
    // GAME SELECTION
    // ============================================================
    function selectGame(gameId) {
      state.selectedId = gameId;
      renderGames(); // re-render to update selected state
      loadPBP(gameId);

      const game = state.games.find(g => g.id === gameId);
      if (game) updatePBPHeader(game);
    }

    // ============================================================
    // LIVE POLLERS
    // ============================================================
    function startLivePollers() {
      const liveGames = state.games.filter(g => isLive(g.status));

      // Stop pollers for games no longer live
      Object.keys(state.pollers).forEach(id => {
        if (!liveGames.find(g => g.id === id)) {
          clearTimeout(state.pollers[id]);
          delete state.pollers[id];
        }
      });

      // Start pollers for live games
      liveGames.forEach(g => {
        if (!state.pollers[g.id]) {
          pollGame(g.id);
        }
      });
    }

    async function pollGame(gameId) {
      try {
        const data = await fetchPBP(gameId);
        processPBPData(gameId, data);

        // Update the game in state.games with latest score/status
        const game = state.games.find(g => g.id === gameId);
        if (game && data) {
          if (data.quarter) game.quarter = data.quarter;
          if (data.clock) game.clock = data.clock;
          if (data.status) game.status = data.status;
          if (data.home?.points != null) game.home.points = data.home.points;
          if (data.away?.points != null) game.away.points = data.away.points;
          renderGames();
        }

        // Continue polling if still live
        if (isLive(data?.status)) {
          state.pollers[gameId] = setTimeout(() => pollGame(gameId), 2000);
        } else {
          delete state.pollers[gameId]; // Game over
        }
      } catch (err) {
        // Retry after delay on error
        state.pollers[gameId] = setTimeout(() => pollGame(gameId), 5000);
      }
    }

    // ============================================================
    // PBP DATA PROCESSING
    // ============================================================
    function processPBPData(gameId, data) {
      if (!data) return;
      state.pbp[gameId] = data;

      // Initialize known event set
      if (!state.knownEventIds[gameId]) state.knownEventIds[gameId] = new Set();

      if (gameId === state.selectedId) {
        renderPBP(gameId, data);
        updatePBPHeader(state.games.find(g => g.id === gameId), data);
      }
    }

    async function loadPBP(gameId) {
      const feed = document.getElementById('pbp-feed');
      const game = state.games.find(g => g.id === gameId);

      if (game && !isLive(game.status) && game.status?.toLowerCase() !== 'closed' && game.status?.toLowerCase() !== 'complete') {
        // Upcoming game — don't fetch PBP yet
        const away = game.away || {};
        const home = game.home || {};
        updatePBPHeader(game);
        feed.innerHTML = `<div class="pbp-empty">
      <div style="font-weight:700;margin-bottom:6px">game not started</div>
      <div style="font-size:12px;color:var(--muted)">
        ${away.name || away.alias} @ ${home.name || home.alias}<br>
        tip-off: ${game.scheduled ? gameLocalTime(game.scheduled) : 'tbd'}
      </div>
    </div>`;
        return;
      }

      // Already have data
      if (state.pbp[gameId]) {
        renderPBP(gameId, state.pbp[gameId]);
        return;
      }

      feed.innerHTML = '<div class="pbp-loading"><div class="spinner-sm"></div>loading play-by-play…</div>';
      setStatus('fetching play-by-play…', 'loading');

      try {
        const data = await fetchPBP(gameId);
        processPBPData(gameId, data);
        setStatus('play-by-play loaded', 'ok');
      } catch (err) {
        feed.innerHTML = `<div class="error-banner">could not load pbp: ${err.message}</div>`;
        setStatus('pbp fetch failed', 'error');
      }
    }

    // ============================================================
    // PBP RENDERING
    // ============================================================
    function updatePBPHeader(game, pbpData) {
      if (!game) return;
      const away = game.away || pbpData?.away || {};
      const home = game.home || pbpData?.home || {};
      const awayInfo = teamInfo(away.alias || away.abbr || '');
      const homeInfo = teamInfo(home.alias || home.abbr || '');

      document.getElementById('pbp-away-alias').textContent = away.alias || away.abbr || '—';
      document.getElementById('pbp-home-alias').textContent = home.alias || home.abbr || '—';

      const awayScore = pbpData?.away?.points ?? game.away?.points ?? null;
      const homeScore = pbpData?.home?.points ?? game.home?.points ?? null;

      const awayEl = document.getElementById('pbp-away-score');
      const homeEl = document.getElementById('pbp-home-score');
      awayEl.textContent = awayScore ?? '—';
      homeEl.textContent = homeScore ?? '—';
      awayEl.style.color = awayScore !== null ? awayInfo.color : 'var(--muted)';
      homeEl.style.color = homeScore !== null ? homeInfo.color : 'var(--muted)';

      const status = pbpData?.status || game.status || '';
      const quarter = pbpData?.quarter || game.quarter;
      const clock = pbpData?.clock || game.clock;

      const periodEl = document.getElementById('pbp-period');
      const clockEl = document.getElementById('pbp-clock-display');
      const statusEl = document.getElementById('pbp-status-label');

      if (isLive(status)) {
        periodEl.textContent = periodLabel(quarter);
        clockEl.textContent = clock || '';
        statusEl.textContent = 'live';
        statusEl.style.color = 'var(--live)';
      } else if (status.toLowerCase() === 'halftime') {
        periodEl.textContent = 'halftime';
        clockEl.textContent = '';
        statusEl.textContent = '';
      } else if (status.toLowerCase() === 'closed' || status.toLowerCase() === 'complete') {
        periodEl.textContent = 'final';
        clockEl.textContent = '';
        statusEl.textContent = 'final';
        statusEl.style.color = 'var(--muted)';
      } else {
        periodEl.textContent = game.scheduled ? gameLocalTime(game.scheduled) : '—';
        clockEl.textContent = '';
        statusEl.textContent = '';
      }
    }

    function playEventType(event) {
      const type = (event.event_type || event.type || '').toLowerCase();
      const desc = (event.description || '').toLowerCase();
      if (type === 'fieldgoalmade' || (type === 'pointscoredplay' && !desc.includes('free'))) {
        if (desc.includes('3-pt') || desc.includes('3pt') || desc.includes('three')) return 'pts3';
        return 'pts2';
      }
      if (type === 'freethrowmade') return 'ft';
      if (type === 'fieldgoalmissed' || type === 'freethrowmissed') return 'miss';
      if (type === 'turnoverplay' || type === 'turnover') return 'turnover';
      if (type === 'foulplay' || type === 'foul') return 'foul';
      if (type === 'reboundplay' || type === 'rebound') return 'rebound';
      if (type === 'timeout') return 'timeout';
      if (type === 'periodstart' || type === 'startperiod') return 'period';
      if (type === 'periodend' || type === 'endperiod') return 'period';
      if (desc.includes('makes') || desc.includes('made')) return desc.includes('3') ? 'pts3' : 'pts2';
      if (desc.includes('misses') || desc.includes('missed')) return 'miss';
      if (desc.includes('turnover')) return 'turnover';
      if (desc.includes('foul')) return 'foul';
      if (desc.includes('rebound')) return 'rebound';
      return 'other';
    }

    function playIcon(type) {
      switch (type) {
        case 'pts2': return '';
        case 'pts3': return '';
        case 'ft': return '';
        case 'miss': return '';
        case 'turnover': return '';
        case 'foul': return '';
        case 'rebound': return '';
        case 'timeout': return '';
        default: return '';
      }
    }

    function renderPBP(gameId, data) {
      const feed = document.getElementById('pbp-feed');
      if (!data) return;

      // Collect all events from all periods
      const periods = data.periods || [];
      const allEvents = [];
      periods.forEach(period => {
        const events = period.events || [];
        events.forEach(ev => {
          allEvents.push({ ...ev, periodNum: period.number || period.sequence });
        });
      });

      if (!allEvents.length) {
        feed.innerHTML = '<div class="pbp-empty">no play-by-play data available yet.</div>';
        return;
      }

      // Check for new events (for animation on live updates)
      const known = state.knownEventIds[gameId] || new Set();
      const newIds = new Set();
      allEvents.forEach(e => { if (e.id && !known.has(e.id)) newIds.add(e.id); });
      allEvents.forEach(e => { if (e.id) known.add(e.id); });
      state.knownEventIds[gameId] = known;

      // Render — most recent first
      const reversed = [...allEvents].reverse();

      let html = '';
      let lastPeriod = null;

      reversed.forEach(ev => {
        // Period separator
        if (ev.periodNum !== lastPeriod) {
          const pLabel = ev.periodNum > 4 ? `ot${ev.periodNum - 4 > 1 ? ev.periodNum - 4 : ''}` : `quarter ${ev.periodNum}`;
          html += `<div class="period-sep"><div class="period-line"></div>${pLabel}<div class="period-line"></div></div>`;
          lastPeriod = ev.periodNum;
        }

        const type = playEventType(ev);
        if (type === 'period') return; // Skip period start/end events (handled by separator)

        const desc = ev.description || ev.desc || '—';
        const clock = ev.clock || '';
        const icon = playIcon(type);
        const iconHtml = icon ? `${icon} ` : '';
        const isNew = ev.id && newIds.has(ev.id);

        const homePoints = ev.home_points ?? '';
        const awayPoints = ev.away_points ?? '';
        const scoreStr = (homePoints !== '' && awayPoints !== '')
          ? `${data.away?.alias || ''}  ${awayPoints} – ${homePoints}  ${data.home?.alias || ''}`
          : '';

        html += `<div class="play-event ${type}${isNew ? ' new' : ''}">
      <span class="play-clock">${clock}</span>
      <div class="play-body">
        <span class="play-icon">${iconHtml}<span class="play-desc">${escHtml(desc)}</span></span>
        ${scoreStr ? `<span style="font-size:11px;color:var(--muted)">${escHtml(scoreStr)}</span>` : ''}
      </div>
      ${scoreStr ? `<span class="play-score-change">${awayPoints}–${homePoints}</span>` : '<span></span>'}
    </div>`;
      });

      // Preserve scroll position if user has scrolled down
      const wasAtTop = feed.scrollTop < 60;
      feed.innerHTML = html || '<div class="pbp-empty">no plays yet.</div>';
      if (wasAtTop) feed.scrollTop = 0;
    }

    function escHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ============================================================
    // SCHEDULE REFRESH (every 5 min for score updates on non-live)
    // ============================================================
    async function refreshScheduleScores() {
      if (!state.games.length) return;
      const d = state.viewDate;
      const y = d.getFullYear();
      const m = pad2(d.getMonth() + 1);
      const day = pad2(d.getDate());
      try {
        const data = await enqueue(() => apiFetch(`games/${y}/${m}/${day}/schedule.json`), 1);
        if (data.games) {
          state.games = data.games;
          renderGames();
          startLivePollers();
        }
      } catch { }
    }

    // ============================================================
    // DATE NAVIGATION
    // ============================================================
    function changeDate(delta) {
      const d = new Date(state.viewDate);
      d.setDate(d.getDate() + delta);
      state.viewDate = d;
      state.games = [];
      state.pbp = {};
      state.knownEventIds = {};

      // Stop all pollers
      Object.values(state.pollers).forEach(t => clearTimeout(t));
      state.pollers = {};

      loadSchedule();
    }

    document.getElementById('prev-day').addEventListener('click', () => changeDate(-1));
    document.getElementById('next-day').addEventListener('click', () => changeDate(1));

    // ============================================================
    // CLOCK
    // ============================================================
    function tickClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'America/New_York' }) + ' et';
    }
    tickClock();
    setInterval(tickClock, 1000);

    // ============================================================
    // SCHEDULE REFRESH LOOP
    // ============================================================
    setInterval(refreshScheduleScores, 5 * 60 * 1000); // Every 5 min

    // ============================================================
    // INIT
    // ============================================================
    loadSchedule();
  </script>
</body>

</html>
